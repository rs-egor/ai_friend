version: '3.8'

services:
  # Backend - FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: ai_friend_backend/Dockerfile
    container_name: ai_friend_backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DATABASE_URL=sqlite+aiosqlite:///./ai_friend.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your_secret_key_change_in_production}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - FRONTEND_URL=http://localhost:8080
      - DEBUG=true
    volumes:
      - backend_data:/app/backend/ai_friend_backend
    restart: unless-stopped
    networks:
      - ai_friend_network

  # Frontend - Vite/React (development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ai_friend_frontend
    ports:
      - "8080:8080"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ai_friend_network

  # Production Frontend - Nginx
  frontend_prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_friend_frontend_prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ai_friend_network
    profiles:
      - production

volumes:
  backend_data:

networks:
  ai_friend_network:
    driver: bridge
